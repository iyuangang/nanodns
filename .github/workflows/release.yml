name: Release — PyPI & OCI

# ──────────────────────────────────────────────────────────────────────────────
# Trigger × Commit prefix matrix
#
#  Trigger  Prefix                  Tests  Docker  PyPI
#  ───────  ──────────────────────  ─────  ──────  ────
#  tag v*   any                     ✅     ✅      ✅
#  main     feat/fix/perf/refactor  ✅     ✅      —
#  main     test/ci/build           ✅     ⏭️      —
#  main     docs/style/chore        ⏭️     ⏭️      —
#  PR       any                     ✅*    ⏭️      —
#
#  * PR tests run via test.yml directly, not this workflow
#  Docker skip signal comes from test.yml → tests.outputs.skip_docker
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  GHCR_IMAGE:      ghcr.io/${{ github.repository_owner }}/nanodns
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nanodns

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write   # required by actions/attest for both PyPI and Docker

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

# ══════════════════════════════════════════════════════════════════════════════
# 1️⃣  TESTS  (shared workflow, runs on every trigger)
# ══════════════════════════════════════════════════════════════════════════════
  tests:
    name: Tests
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read
    # Exposes outputs: result, skip_docker


# ══════════════════════════════════════════════════════════════════════════════
# 2️⃣  BUILD PyPI DISTRIBUTION  (tag only)
# ══════════════════════════════════════════════════════════════════════════════
  build-pypi:
    name: Build PyPI Distribution
    runs-on: ubuntu-latest
    needs: tests
    # Only on tags AND only if tests actually ran (not skipped by docs/style/chore commit)
    if: startsWith(github.ref, 'refs/tags/v') && needs.tests.outputs.result != 'skipped'

    permissions:
      contents: read

    outputs:
      version:    ${{ steps.version.outputs.version }}
      whl-name:   ${{ steps.filenames.outputs.whl }}
      sdist-name: ${{ steps.filenames.outputs.sdist }}

    env:
      PYTHONHASHSEED: "0"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade build twine

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify pyproject.toml version matches tag
        run: |
          PROJECT_VERSION=$(python - <<'EOF'
          import tomllib
          with open("pyproject.toml", "rb") as f:
            print(tomllib.load(f)["project"]["version"])
          EOF
          )
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: pyproject=$PROJECT_VERSION tag=$TAG_VERSION"
            exit 1
          fi
          echo "✅ Version: $PROJECT_VERSION"

      - name: Clean previous builds
        run: rm -rf dist build *.egg-info

      - name: Build sdist and wheel (reproducible)
        run: |
          # git log -1 --format=%ct → Unix integer seconds, no format conversion needed
          # github.event.head_commit.timestamp is ISO 8601 and breaks wheel's int()
          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          export SOURCE_DATE_EPOCH
          echo "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}"
          python -m build --sdist --wheel

      - name: Twine check
        run: twine check dist/*

      - name: Generate SHA256 checksums
        run: sha256sum dist/*.whl dist/*.tar.gz > SHA256SUMS

      - name: Capture filenames
        id: filenames
        run: |
          echo "whl=$(basename dist/*.whl)"     >> $GITHUB_OUTPUT
          echo "sdist=$(basename dist/*.tar.gz)" >> $GITHUB_OUTPUT

      # ── Attest wheel ────────────────────────────────────────────────────────
      # Generates a GitHub-signed provenance attestation for the wheel and
      # uploads it to the repository's attestations store.
      # Verify later with:
      #   gh attestation verify nanodns-*.whl --repo iyuangang/nanodns
      - name: Attest wheel provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/${{ steps.filenames.outputs.whl }}

      # ── Attest sdist ────────────────────────────────────────────────────────
      - name: Attest sdist provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/${{ steps.filenames.outputs.sdist }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3


# ══════════════════════════════════════════════════════════════════════════════
# 3️⃣  VERIFY WHEEL — cross-platform matrix  (tag only)
# ══════════════════════════════════════════════════════════════════════════════
  verify-whl:
    name: Verify WHL (${{ matrix.os }} / Py ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: build-pypi
    if: startsWith(github.ref, 'refs/tags/v')

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.14"]

    permissions:
      contents: read

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install wheel
        run: python -m pip install --no-cache-dir dist/${{ needs.build-pypi.outputs.whl-name }}

      - name: Verify CLI version
        shell: bash
        run: |
          INSTALLED=$(nanodns --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          EXPECTED="${{ needs.build-pypi.outputs.version }}"
          [ "$INSTALLED" = "$EXPECTED" ] \
            && echo "✅ $INSTALLED" \
            || (echo "❌ $INSTALLED != $EXPECTED" && exit 1)

      - name: Smoke test
        shell: bash
        run: |
          nanodns init verify.json
          nanodns check verify.json
          echo "✅ init/check OK"


# ══════════════════════════════════════════════════════════════════════════════
# 4️⃣  RELEASE SUMMARY  (tag only — runs BEFORE github-release)
#     Writes release_body.md → uploaded as artifact.
#     github-release reads it via body-path (avoids YAML multiline issues).
# ══════════════════════════════════════════════════════════════════════════════
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs:
      - build-pypi
      - verify-whl
      - build-docker
      - verify-docker
      - scan
      - sign
      - verify-signature
    if: always() && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release body and step summary
        env:
          VERSION:    ${{ needs.build-pypi.outputs.version }}
          DIGEST:     ${{ needs.build-docker.outputs.digest }}
          GHCR:       ${{ env.GHCR_IMAGE }}
          R_BUILD:    ${{ needs.build-pypi.result }}
          R_WHL:      ${{ needs.verify-whl.result }}
          R_DOCKER:   ${{ needs.build-docker.result }}
          R_VERIFY:   ${{ needs.verify-docker.result }}
          R_SCAN:     ${{ needs.scan.result }}
          R_SIGN:     ${{ needs.sign.result }}
          R_SIGVER:   ${{ needs.verify-signature.result }}
          REPO:       ${{ github.repository }}
          REF_NAME:   ${{ github.ref_name }}
          SHA:        ${{ github.sha }}
        shell: python
        run: |
          import os, subprocess, pathlib

          env = os.environ
          version  = env["VERSION"]
          digest   = env["DIGEST"]
          image    = env["GHCR"]
          ref      = env["REF_NAME"]
          sha      = env["SHA"]
          repo     = env["REPO"]

          results = {
              "build":     env["R_BUILD"],
              "whl":       env["R_WHL"],
              "docker":    env["R_DOCKER"],
              "verify":    env["R_VERIFY"],
              "scan":      env["R_SCAN"],
              "sign":      env["R_SIGN"],
              "sigver":    env["R_SIGVER"],
          }

          icons = {"success": "✅", "failure": "❌", "skipped": "⏭️", "cancelled": "🚫"}
          def icon(k): return icons.get(results[k], "⚪")
          def row(label, k): return f"| {label} | {icon(k)} `{results[k]}` |"

          all_ok = all(results[k] == "success" for k in ["whl", "docker", "scan", "sign"])
          overall = "✅ All checks passed" if all_ok else "⚠️ Some checks failed"

          # ── Changelog ────────────────────────────────────────────────────
          tags = subprocess.run(
              ["git", "tag", "--sort=-version:refname"],
              capture_output=True, text=True
          ).stdout.strip().splitlines()
          vtags = [t for t in tags if t.startswith("v")]
          prev  = vtags[1] if len(vtags) > 1 else ""
          log_range = f"{prev}..HEAD" if prev else "HEAD"
          commits = subprocess.run(
              ["git", "log", "--pretty=format:- %s (%h)", log_range],
              capture_output=True, text=True
          ).stdout.strip()

          # ── Release page body ─────────────────────────────────────────────
          body_lines = [
              "## What's Changed",
              "",
              commits,
              "",
              "---",
              "",
              "## 📦 Install",
              "",
              "```bash",
              f"pip install nanodns=={version}",
              "```",
              "",
              "```bash",
              f"docker pull {image}:{version}",
              "```",
          ]
          if digest:
              body_lines += [
                  "",
                  "```bash",
                  "# Pin to immutable digest",
                  f"docker pull {image}@{digest}",
                  "```",
              ]
          body_lines += [
              "",
              "---",
              "",
              "## 🔏 Verify authenticity",
              "",
              "**PyPI wheel / sdist** — GitHub signed provenance attestation:",
              "```bash",
              f"gh attestation verify nanodns-{version}-py3-none-any.whl --repo {repo}",
              "```",
              "",
              "**OCI image** — GitHub signed provenance attestation:",
              "```bash",
              f"gh attestation verify oci://{image}:{version} --repo {repo}",
              "```",
              "",
              "**OCI image** — Cosign keyless signature (Sigstore):",
              "```bash",
              f"cosign verify \\",
              f'  --certificate-identity-regexp="https://github.com/{repo}/.github/workflows/release.yml@refs/tags/.*" \\',
              f'  --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \\',
              f"  {image}:{version}",
              "```",
              "",
              "---",
              "",
              f"## 🔍 Pipeline — {overall}",
              "",
              "### 📦 PyPI",
              "| Step | Result |",
              "|---|---|",
              row("Build distribution",            "build"),
              row("Verify wheel (cross-platform)", "whl"),
              "",
              "### 🐳 Docker",
              "| Step | Result |",
              "|---|---|",
              row("Build & push OCI image",        "docker"),
              row("GitHub attestation (attest)",   "docker"),
              row("Runtime verification (amd64)",  "verify"),
              row("Vulnerability scan (Trivy)",    "scan"),
              row("Sign image (Cosign keyless)",   "sign"),
              row("Verify signature & provenance", "sigver"),
          ]
          pathlib.Path("/tmp/release_body.md").write_text("\n".join(body_lines) + "\n")
          print("✅ release_body.md written")

          # ── Actions Step Summary ──────────────────────────────────────────
          summary_lines = [
              f"## 🚀 NanoDNS {ref} — {overall}",
              "",
              "| | |",
              "|---|---|",
              f"| **Version** | `{version}` |",
              f"| **SHA**     | `{sha}` |",
              "",
              "### 📦 PyPI Pipeline",
              "| Step | Result |",
              "|---|---|",
              row("Build distribution",            "build"),
              row("Verify wheel (cross-platform)", "whl"),
              "",
              "### 🐳 Docker Pipeline",
              "| Step | Result |",
              "|---|---|",
              row("Build & push OCI image",        "docker"),
              row("GitHub attestation (attest)",   "docker"),
              row("Runtime verification (amd64)",  "verify"),
              row("Vulnerability scan (Trivy)",    "scan"),
              row("Sign image (Cosign keyless)",   "sign"),
              row("Verify signature & provenance", "sigver"),
          ]
          if digest:
              summary_lines += [
                  "",
                  "🐳 **Immutable digest:**",
                  "```",
                  f"docker pull {image}@{digest}",
                  "```",
              ]
          pathlib.Path(env["GITHUB_STEP_SUMMARY"]).write_text(
              "\n".join(summary_lines) + "\n"
          )
          print("✅ GITHUB_STEP_SUMMARY written")

      - name: Upload release body artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-body
          path: /tmp/release_body.md
          retention-days: 1


# ══════════════════════════════════════════════════════════════════════════════
# 5️⃣  GITHUB RELEASE  (tag only, after summary)
#     Reads release_body.md via body-path — avoids YAML multiline truncation.
# ══════════════════════════════════════════════════════════════════════════════
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [summary, verify-whl]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: release-body
          path: /tmp/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "NanoDNS ${{ github.ref_name }}"
          body_path:  /tmp/release_body.md
          draft:      false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            SHA256SUMS


# 6️⃣  PUBLISH TO PyPI  (tag only, after GitHub release)
# ══════════════════════════════════════════════════════════════════════════════
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: github-release
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/project/nanodns/

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via Trusted Publishing (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: false
          verbose: true

# ══════════════════════════════════════════════════════════════════════════════
# 7️⃣  BUILD & PUSH DOCKER IMAGE  (tag + main, skip PR)
# ══════════════════════════════════════════════════════════════════════════════
  build-docker:
    name: Build & Push OCI Image
    runs-on: ubuntu-latest
    needs: tests
    if: >-
      github.event_name != 'pull_request' &&
      needs.tests.outputs.result != 'skipped' &&
      needs.tests.outputs.skip_docker != 'true'

    outputs:
      digest:  ${{ steps.build.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=NanoDNS
            org.opencontainers.image.description=Lightweight JSON-configurable DNS server
            org.opencontainers.image.vendor=NanoDNS Contributors
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build & Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            GIT_REVISION=${{ github.sha }}
            REPO_URL=https://github.com/${{ github.repository }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache,mode=max
          provenance: true
          sbom: true

      # ── Attest OCI image ────────────────────────────────────────────────────
      # Generates a GitHub-signed SLSA provenance attestation for the OCI image
      # and uploads it to the repository's attestations store.
      # This is separate from (and complementary to) the cosign keyless signature
      # in the `sign` job — cosign writes to the OCI registry transparency log,
      # while actions/attest writes to GitHub's attestations API.
      #
      # Verify later with:
      #   gh attestation verify oci://ghcr.io/iyuangang/nanodns:latest \
      #     --repo iyuangang/nanodns
      - name: Attest OCI image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name:   ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          # Push the attestation bundle into the GHCR OCI registry so it is
          # co-located with the image and discoverable by `cosign verify-attestation`.
          push-to-registry: true


# ══════════════════════════════════════════════════════════════════════════════
# 8️⃣  VERIFY DOCKER RUNTIME  (amd64)
# ══════════════════════════════════════════════════════════════════════════════
  verify-docker:
    name: Verify Docker Runtime
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name != 'pull_request'

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull by digest
        run: docker pull ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}

      - name: Verify CLI (python -m, distroless-compatible)
        run: |
          docker run --rm \
            --entrypoint /usr/bin/python \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            -m nanodns.cli --version

      - name: Functional DNS test
        run: |
          cat > /tmp/test.json <<'CONF'
          {
            "server": {
              "host": "0.0.0.0", "port": 53, "upstream": ["8.8.8.8"],
              "upstream_port": 53, "upstream_timeout": 3,
              "log_queries": false, "hot_reload": false,
              "cache_enabled": true, "cache_ttl": 300, "cache_size": 200,
              "log_level": "WARNING"
            },
            "zones": {"verify.lan": {}},
            "records": [{"name":"ping.verify.lan","type":"A","value":"1.2.3.4","ttl":60}],
            "rewrites": []
          }
          CONF

          docker run -d --name dns-test \
            --cap-add NET_BIND_SERVICE \
            -p 5399:53/udp \
            -v /tmp/test.json:/etc/nanodns.json:ro \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            start --config /etc/nanodns.json

          sleep 5
          sudo apt-get install -y -qq dnsutils
          RESULT=$(dig @127.0.0.1 -p 5399 ping.verify.lan A +short +time=3)
          docker stop dns-test && docker rm dns-test

          [ "$RESULT" = "1.2.3.4" ] \
            && echo "✅ DNS resolved: $RESULT" \
            || (echo "❌ Expected 1.2.3.4 got: $RESULT" && exit 1)

      - name: Verify OCI labels
        run: |
          IMAGE="${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}"
          MISSING=0
          for label in \
            org.opencontainers.image.title \
            org.opencontainers.image.version \
            org.opencontainers.image.created \
            org.opencontainers.image.source \
            org.opencontainers.image.revision \
            org.opencontainers.image.licenses; do
            VALUE=$(docker inspect "$IMAGE" \
              --format "{{ index .Config.Labels \"$label\" }}")
            if [ -z "$VALUE" ]; then
              echo "❌ Missing label: $label"; MISSING=$((MISSING+1))
            else
              echo "✅ $label = $VALUE"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

      - name: Verify non-root user
        run: |
          USER=$(docker inspect \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            --format '{{ .Config.User }}')
          echo "User: ${USER:-<default>}"
          [[ "$USER" == "root" || "$USER" == "0" ]] \
            && echo "⚠️  WARNING: runs as root" \
            || echo "✅ non-root"


# ══════════════════════════════════════════════════════════════════════════════
# 9️⃣  VULNERABILITY SCAN
# ══════════════════════════════════════════════════════════════════════════════
  scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name != 'pull_request'

    steps:
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref:  ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}
          severity:   CRITICAL,HIGH
          exit-code:  1


# ══════════════════════════════════════════════════════════════════════════════
# 🔟  COSIGN SIGN  (tag only)
# ══════════════════════════════════════════════════════════════════════════════
  sign:
    name: Sign Image (Cosign Keyless)
    runs-on: ubuntu-latest
    needs: [build-docker, verify-docker, scan]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write
      packages: write

    steps:
      - uses: sigstore/cosign-installer@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}


# ══════════════════════════════════════════════════════════════════════════════
# 1️⃣1️⃣  VERIFY SIGNATURE + PROVENANCE  (tag only)
# ══════════════════════════════════════════════════════════════════════════════
  verify-signature:
    name: Verify Signature & Provenance
    runs-on: ubuntu-latest
    needs: [sign, build-docker]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write
      packages: read
      attestations: read

    steps:
      - uses: sigstore/cosign-installer@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify cosign signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}

      - name: Verify SLSA provenance (docker/build-push-action)
        run: |
          cosign verify-attestation \
            --type slsaprovenance02 \
            --certificate-identity-regexp="https://github.com/docker/build-push-action@.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            && echo "provenance OK" \
            || echo "WARNING: provenance attestation not found in Sigstore (non-fatal)"

      # ── GitHub Attestation verification ─────────────────────────────────────
      # Verifies the provenance attestation written by actions/attest-build-provenance
      # in the build-docker job.  Uses the `gh` CLI which reads from GitHub's
      # attestations API (independent of the Sigstore transparency log).
      - name: Verify GitHub attestation (OCI image)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify \
            oci://${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            --repo ${{ github.repository }}
          echo "✅ GitHub attestation verified for OCI image"


# ══════════════════════════════════════════════════════════════════════════════
# 1️⃣2️⃣  VERIFY PyPI PACKAGE  (tag only, after publish)
# ══════════════════════════════════════════════════════════════════════════════
  verify-pypi:
    name: Verify PyPI Package
    runs-on: ubuntu-latest
    needs: [publish-pypi, build-pypi]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read

    steps:
      - name: Wait for index propagation
        run: sleep 90

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from PyPI
        run: |
          python -m pip install --no-cache-dir \
            --index-url https://pypi.org/simple \
            "nanodns==${{ needs.build-pypi.outputs.version }}"

      - name: Smoke test
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          INSTALLED=$(nanodns --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          [ "$INSTALLED" = "$VERSION" ] \
            && echo "✅ PyPI $INSTALLED" \
            || (echo "❌ $INSTALLED != $VERSION" && exit 1)
          nanodns init smoke.json
          nanodns check smoke.json
          echo "✅ PyPI smoke test passed"
