name: Release — PyPI & OCI

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
#   tag v*   → full pipeline: test → build PyPI → build Docker → sign → publish
#   main     → build + push Docker only (no PyPI, no sign)
#   PR       → test + build-only (nothing pushed)
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  GHCR_IMAGE:      ghcr.io/${{ github.repository_owner }}/nanodns
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nanodns

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

# ══════════════════════════════════════════════════════════════════════════════
# 1️⃣  TESTS  (shared workflow, runs on every trigger)
# ══════════════════════════════════════════════════════════════════════════════
  tests:
    name: Tests
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read


# ══════════════════════════════════════════════════════════════════════════════
# 2️⃣  BUILD PyPI DISTRIBUTION  (tag only)
# ══════════════════════════════════════════════════════════════════════════════
  build-pypi:
    name: Build PyPI Distribution
    runs-on: ubuntu-latest
    needs: tests
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read

    outputs:
      version:    ${{ steps.version.outputs.version }}
      whl-name:   ${{ steps.filenames.outputs.whl }}
      sdist-name: ${{ steps.filenames.outputs.sdist }}

    env:
      PYTHONHASHSEED: "0"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade build twine

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify pyproject.toml version matches tag
        run: |
          PROJECT_VERSION=$(python - <<'EOF'
          import tomllib
          with open("pyproject.toml", "rb") as f:
            print(tomllib.load(f)["project"]["version"])
          EOF
          )
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: pyproject=$PROJECT_VERSION tag=$TAG_VERSION"
            exit 1
          fi
          echo "✅ Version: $PROJECT_VERSION"

      - name: Clean previous builds
        run: rm -rf dist build *.egg-info

      - name: Build sdist and wheel (reproducible)
        run: |
          # git log -1 --format=%ct → Unix integer seconds, no format conversion needed
          # github.event.head_commit.timestamp is ISO 8601 and breaks wheel's int()
          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          export SOURCE_DATE_EPOCH
          echo "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}"
          python -m build --sdist --wheel

      - name: Twine check
        run: twine check dist/*

      - name: Generate SHA256 checksums
        run: sha256sum dist/*.whl dist/*.tar.gz > SHA256SUMS

      - name: Capture filenames
        id: filenames
        run: |
          echo "whl=$(basename dist/*.whl)"     >> $GITHUB_OUTPUT
          echo "sdist=$(basename dist/*.tar.gz)" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3


# ══════════════════════════════════════════════════════════════════════════════
# 3️⃣  VERIFY WHEEL — cross-platform matrix  (tag only)
# ══════════════════════════════════════════════════════════════════════════════
  verify-whl:
    name: Verify WHL (${{ matrix.os }} / Py ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: build-pypi
    if: startsWith(github.ref, 'refs/tags/v')

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]

    permissions:
      contents: read

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install wheel
        run: python -m pip install --no-cache-dir dist/${{ needs.build-pypi.outputs.whl-name }}

      - name: Verify CLI version
        shell: bash
        run: |
          INSTALLED=$(nanodns --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          EXPECTED="${{ needs.build-pypi.outputs.version }}"
          [ "$INSTALLED" = "$EXPECTED" ] \
            && echo "✅ $INSTALLED" \
            || (echo "❌ $INSTALLED != $EXPECTED" && exit 1)

      - name: Smoke test
        shell: bash
        run: |
          nanodns init verify.json
          nanodns check verify.json
          echo "✅ init/check OK"


# ══════════════════════════════════════════════════════════════════════════════
# 4️⃣  GITHUB RELEASE  (tag only, after wheel verification)
# ══════════════════════════════════════════════════════════════════════════════
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: verify-whl
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)")
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          fi
          {
            echo "changelog<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "NanoDNS ${{ github.ref_name }}"
          body:       ${{ steps.changelog.outputs.changelog }}
          draft:      false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            SHA256SUMS


# ══════════════════════════════════════════════════════════════════════════════
# 5️⃣  PUBLISH TO PyPI  (tag only, after GitHub release)
# ══════════════════════════════════════════════════════════════════════════════
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: github-release
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/project/nanodns/

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via Trusted Publishing (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Only upload recognized distribution files (.whl, .tar.gz).
          # SHA256SUMS is intentionally kept outside dist/ to avoid
          # InvalidDistribution errors from the publish action.
          packages-dir: dist/
          skip-existing: false
          verbose: true


# ══════════════════════════════════════════════════════════════════════════════
# 6️⃣  BUILD & PUSH DOCKER IMAGE  (tag + main, skip PR)
# ══════════════════════════════════════════════════════════════════════════════
  build-docker:
    name: Build & Push OCI Image
    runs-on: ubuntu-latest
    # Docker build runs independently of PyPI publish:
    #   tag push  → after tests (parallel with PyPI pipeline)
    #   main push → after tests
    #   PR        → skipped
    needs: tests
    if: github.event_name != 'pull_request'

    outputs:
      digest:  ${{ steps.build.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=NanoDNS
            org.opencontainers.image.description=Lightweight JSON-configurable DNS server
            org.opencontainers.image.vendor=NanoDNS Contributors
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build & Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            GIT_REVISION=${{ github.sha }}
            REPO_URL=https://github.com/${{ github.repository }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache,mode=max
          provenance: true
          sbom: true


# ══════════════════════════════════════════════════════════════════════════════
# 7️⃣  VERIFY DOCKER RUNTIME  (amd64)
# ══════════════════════════════════════════════════════════════════════════════
  verify-docker:
    name: Verify Docker Runtime
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name != 'pull_request'

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull by digest
        run: docker pull ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}

      - name: Verify CLI (python -m, distroless-compatible)
        run: |
          docker run --rm \
            --entrypoint /usr/bin/python \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            -m nanodns.cli --version

      - name: Functional DNS test
        run: |
          cat > /tmp/test.json <<'CONF'
          {
            "server": {
              "host": "0.0.0.0", "port": 53, "upstream": ["8.8.8.8"],
              "upstream_port": 53, "upstream_timeout": 3,
              "log_queries": false, "hot_reload": false,
              "cache_enabled": true, "cache_ttl": 300, "cache_size": 200,
              "log_level": "WARNING"
            },
            "zones": {"verify.lan": {}},
            "records": [{"name":"ping.verify.lan","type":"A","value":"1.2.3.4","ttl":60}],
            "rewrites": []
          }
          CONF

          docker run -d --name dns-test \
            --cap-add NET_BIND_SERVICE \
            -p 5399:53/udp \
            -v /tmp/test.json:/etc/nanodns.json:ro \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            start --config /etc/nanodns.json

          sleep 5
          sudo apt-get install -y -qq dnsutils
          RESULT=$(dig @127.0.0.1 -p 5399 ping.verify.lan A +short +time=3)
          docker stop dns-test && docker rm dns-test

          [ "$RESULT" = "1.2.3.4" ] \
            && echo "✅ DNS resolved: $RESULT" \
            || (echo "❌ Expected 1.2.3.4 got: $RESULT" && exit 1)

      - name: Verify OCI labels
        run: |
          IMAGE="${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}"
          MISSING=0
          for label in \
            org.opencontainers.image.title \
            org.opencontainers.image.version \
            org.opencontainers.image.created \
            org.opencontainers.image.source \
            org.opencontainers.image.revision \
            org.opencontainers.image.licenses; do
            VALUE=$(docker inspect "$IMAGE" \
              --format "{{ index .Config.Labels \"$label\" }}")
            if [ -z "$VALUE" ]; then
              echo "❌ Missing label: $label"; MISSING=$((MISSING+1))
            else
              echo "✅ $label = $VALUE"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

      - name: Verify non-root user
        run: |
          USER=$(docker inspect \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            --format '{{ .Config.User }}')
          echo "User: ${USER:-<default>}"
          [[ "$USER" == "root" || "$USER" == "0" ]] \
            && echo "⚠️  WARNING: runs as root" \
            || echo "✅ non-root"


# ══════════════════════════════════════════════════════════════════════════════
# 8️⃣  VULNERABILITY SCAN
# ══════════════════════════════════════════════════════════════════════════════
  scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name != 'pull_request'

    steps:
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref:  ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}
          severity:   CRITICAL,HIGH
          exit-code:  1


# ══════════════════════════════════════════════════════════════════════════════
# 9️⃣  COSIGN SIGN  (tag only)
# ══════════════════════════════════════════════════════════════════════════════
  sign:
    name: Sign Image (Cosign Keyless)
    runs-on: ubuntu-latest
    needs: [build-docker, verify-docker, scan]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write
      packages: write

    steps:
      - uses: sigstore/cosign-installer@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}


# ══════════════════════════════════════════════════════════════════════════════
# 🔟  VERIFY SIGNATURE + PROVENANCE  (tag only)
# ══════════════════════════════════════════════════════════════════════════════
  verify-signature:
    name: Verify Signature & Provenance
    runs-on: ubuntu-latest
    needs: [sign, build-docker]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write
      packages: read
      attestations: read

    steps:
      - uses: sigstore/cosign-installer@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Verify the cosign keyless signature we pushed in the sign job.
      # Certificate identity matches the workflow that ran cosign sign.
      - name: Verify cosign signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}

      # Verify SLSA provenance stored as OCI referrer by docker/build-push-action.
      # build-push-action pushes provenance as an OCI referrer into the registry,
      # not into GitHub's attestation store (gh attestation verify = 404).
      # cosign v2 renamed the predicate type to slsaprovenance02.
      # The signer identity is docker/build-push-action, not our workflow.
      # Use || true so a missing provenance is a warning, not a pipeline failure.
      - name: Verify SLSA provenance
        run: |
          cosign verify-attestation \
            --type slsaprovenance02 \
            --certificate-identity-regexp="https://github.com/docker/build-push-action@.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            && echo "provenance OK" \
            || echo "WARNING: provenance attestation not found in Sigstore (non-fatal)"


# ══════════════════════════════════════════════════════════════════════════════
# 1️⃣1️⃣  VERIFY PyPI PACKAGE  (tag only, after publish)
# ══════════════════════════════════════════════════════════════════════════════
  verify-pypi:
    name: Verify PyPI Package
    runs-on: ubuntu-latest
    needs: [publish-pypi, build-pypi]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read

    steps:
      - name: Wait for index propagation
        run: sleep 90

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from PyPI
        run: |
          python -m pip install --no-cache-dir \
            --index-url https://pypi.org/simple \
            "nanodns==${{ needs.build-pypi.outputs.version }}"

      - name: Smoke test
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          INSTALLED=$(nanodns --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          [ "$INSTALLED" = "$VERSION" ] \
            && echo "✅ PyPI $INSTALLED" \
            || (echo "❌ $INSTALLED != $VERSION" && exit 1)
          nanodns init smoke.json
          nanodns check smoke.json
          echo "✅ PyPI smoke test passed"


# ══════════════════════════════════════════════════════════════════════════════
# 1️⃣2️⃣  RELEASE SUMMARY  (tag only)
# ══════════════════════════════════════════════════════════════════════════════
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    # Include all jobs so their results are accessible; always() prevents
    # cancellation when an upstream job is skipped or fails.
    needs:
      - build-pypi
      - verify-whl
      - github-release
      - publish-pypi
      - verify-pypi
      - build-docker
      - verify-docker
      - scan
      - sign
      - verify-signature
    if: always() && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Write release summary
        run: |
          # ── helper ───────────────────────────────────────────────────────
          icon() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              cancelled)echo "🚫" ;;
              *)        echo "⚪" ;;
            esac
          }
          row() { echo "| $1 | $(icon $2) \`$2\` |" ; }

          S=$GITHUB_STEP_SUMMARY

          # ── Header ───────────────────────────────────────────────────────
          echo "## 🚀 NanoDNS ${{ github.ref_name }} Release Pipeline" >> $S
          echo "" >> $S
          echo "| | |" >> $S
          echo "|---|---|" >> $S
          echo "| **Version** | \`${{ needs.build-pypi.outputs.version }}\` |" >> $S
          echo "| **Ref** | \`${{ github.ref_name }}\` |" >> $S
          echo "| **SHA** | \`${{ github.sha }}\` |" >> $S
          echo "" >> $S

          # ── PyPI Pipeline ────────────────────────────────────────────────
          echo "### 📦 PyPI Pipeline" >> $S
          echo "" >> $S
          echo "| Step | Result |" >> $S
          echo "|---|---|" >> $S
          row "Build distribution" "${{ needs.build-pypi.result }}" >> $S
          row "Verify wheel (cross-platform matrix)" "${{ needs.verify-whl.result }}" >> $S
          row "Create GitHub Release" "${{ needs.github-release.result }}" >> $S
          row "Publish to PyPI" "${{ needs.publish-pypi.result }}" >> $S
          row "Verify from PyPI index" "${{ needs.verify-pypi.result }}" >> $S
          echo "" >> $S

          if [[ "${{ needs.publish-pypi.result }}" == "success" ]]; then
            echo "📥 **Install:** \`pip install nanodns==${{ needs.build-pypi.outputs.version }}\`" >> $S
            echo "" >> $S
            echo "🔗 https://pypi.org/project/nanodns/${{ needs.build-pypi.outputs.version }}/" >> $S
          fi
          echo "" >> $S

          # ── Docker Pipeline ──────────────────────────────────────────────
          echo "### 🐳 Docker Pipeline" >> $S
          echo "" >> $S
          echo "| Step | Result |" >> $S
          echo "|---|---|" >> $S
          row "Build & push OCI image" "${{ needs.build-docker.result }}" >> $S
          row "Runtime verification (amd64)" "${{ needs.verify-docker.result }}" >> $S
          row "Vulnerability scan (Trivy)" "${{ needs.scan.result }}" >> $S
          row "Sign image (Cosign keyless)" "${{ needs.sign.result }}" >> $S
          row "Verify signature & provenance" "${{ needs.verify-signature.result }}" >> $S
          echo "" >> $S

          if [[ "${{ needs.build-docker.result }}" == "success" ]]; then
            echo "🐳 **Pull:**" >> $S
            echo "\`\`\`" >> $S
            echo "docker pull ${{ env.GHCR_IMAGE }}:${{ needs.build-docker.outputs.version }}" >> $S
            echo "docker pull ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}" >> $S
            echo "\`\`\`" >> $S
          fi
          echo "" >> $S

          # ── Overall status ───────────────────────────────────────────────
          echo "### 📊 Overall Pipeline Status" >> $S
          echo "" >> $S

          PYPI_OK="${{ needs.publish-pypi.result }}"
          DOCK_OK="${{ needs.build-docker.result }}"
          SIGN_OK="${{ needs.sign.result }}"
          SCAN_OK="${{ needs.scan.result }}"

          echo "| Pipeline | Result |" >> $S
          echo "|---|---|" >> $S
          row "PyPI publish" "$PYPI_OK" >> $S
          row "Docker image" "$DOCK_OK" >> $S
          row "Security scan" "$SCAN_OK" >> $S
          row "Image signature" "$SIGN_OK" >> $S

          if [[ "$PYPI_OK" == "success" && "$DOCK_OK" == "success" && "$SIGN_OK" == "success" && "$SCAN_OK" == "success" ]]; then
            echo "" >> $S
            echo "## ✅ Release ${{ github.ref_name }} completed successfully" >> $S
          else
            echo "" >> $S
            echo "## ⚠️ Release ${{ github.ref_name }} completed with issues — review steps above" >> $S
          fi
