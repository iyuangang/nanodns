name: Release — PyPI & OCI

# ──────────────────────────────────────────────────────────────────────────────
# Trigger × Commit prefix matrix
#
#  Trigger  Prefix                  Tests  Docker  PyPI
#  ───────  ──────────────────────  ─────  ──────  ────
#  tag v*   any                     ✅     ✅      ✅
#  main     feat/fix/perf/refactor  ✅     ✅      —
#  main     test/ci/build           ✅     ⏭️      —
#  main     docs/style/chore        ⏭️     ⏭️      —
#  PR       any                     ✅*    ⏭️      —
#
#  * PR tests run via test.yml; this workflow skips Docker on PR
#  Docker skip signal: test.yml → tests.outputs.skip_docker
#
# Job execution order (tag v* trigger):
#
#  tests ──┬── build-pypi ──┬── verify-whl ──────────────────────┐
#           │               └── attest-pypi                       │
#           ├── changelog ──────────────────────────────────────  ├── summary ── github-release ── publish-pypi
#           └── build-docker ──┬── verify-docker ────────────────┤              └── verify-pypi
#                              ├── scan                           │
#                              └── sign ── verify-signature ──────┘
#
# Permission model: top-level read-only; each job grants only what it needs.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/nanodns
  # DockerHub image — set DOCKERHUB_USERNAME secret; leave unset to skip DockerHub push
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME && format('{0}/nanodns', secrets.DOCKERHUB_USERNAME) || '' }}

# ── Principle of least privilege ──────────────────────────────────────────────
# Default to read-only; every job that needs elevated access declares it
# explicitly in its own `permissions:` block.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false


jobs:

# ══════════════════════════════════════════════════════════════════════════════
# 1️⃣  TESTS  (shared workflow — every trigger)
# ══════════════════════════════════════════════════════════════════════════════
  tests:
    name: Tests
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read
    # Exposes outputs: result, skip_docker


# ══════════════════════════════════════════════════════════════════════════════
# 2️⃣  BUILD PyPI DISTRIBUTION  (tag only)
# ══════════════════════════════════════════════════════════════════════════════
  build-pypi:
    name: Build PyPI Distribution
    runs-on: ubuntu-latest
    needs: tests
    if: startsWith(github.ref, 'refs/tags/v') && needs.tests.outputs.result != 'skipped'

    permissions:
      contents: read
      id-token:     write   # actions/attest-build-provenance OIDC
      attestations: write   # actions/attest-build-provenance store

    outputs:
      version:    ${{ steps.version.outputs.version }}
      whl-name:   ${{ steps.filenames.outputs.whl }}
      sdist-name: ${{ steps.filenames.outputs.sdist }}

    env:
      PYTHONHASHSEED: "0"   # reproducible wheel

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject.toml version matches tag
        run: |
          PROJECT_VERSION=$(python - <<'EOF'
          import tomllib
          with open("pyproject.toml", "rb") as f:
            print(tomllib.load(f)["project"]["version"])
          EOF
          )
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: pyproject=$PROJECT_VERSION tag=$TAG_VERSION"
            exit 1
          fi
          echo "✅ Version: $PROJECT_VERSION"

      - name: Build sdist and wheel (reproducible)
        run: |
          # Use commit timestamp for reproducible builds.
          # github.event.head_commit.timestamp is ISO-8601; wheel's int() rejects it.
          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          export SOURCE_DATE_EPOCH
          echo "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}"
          rm -rf dist build *.egg-info
          python -m build --sdist --wheel

      - name: Twine check
        run: twine check dist/*

      - name: Capture filenames + generate checksums
        id: filenames
        run: |
          echo "whl=$(basename   dist/*.whl)"     >> "$GITHUB_OUTPUT"
          echo "sdist=$(basename dist/*.tar.gz)"  >> "$GITHUB_OUTPUT"
          # Include SHA256SUMS inside the artifact so github-release can attach it
          sha256sum dist/*.whl dist/*.tar.gz > dist/SHA256SUMS
          cat dist/SHA256SUMS

      # Provenance attestations — verify with:
      #   gh attestation verify nanodns-*.whl   --repo <owner>/nanodns
      #   gh attestation verify nanodns-*.tar.gz --repo <owner>/nanodns
      - name: Attest wheel provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/${{ steps.filenames.outputs.whl }}

      - name: Attest sdist provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/${{ steps.filenames.outputs.sdist }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/           # includes SHA256SUMS
          retention-days: 3


# ══════════════════════════════════════════════════════════════════════════════
# 3️⃣  VERIFY WHEEL — cross-platform smoke test  (tag only)
#
#  noarch wheels are architecture-independent but interpreter behaviour can
#  differ across OS (path separators, socket APIs). We test one Python version
#  per OS (latest stable) — 3 jobs instead of 6, since the wheel tag is
#  `py3-none-any` and interpreter compatibility is the variable of interest.
# ══════════════════════════════════════════════════════════════════════════════
  verify-whl:
    name: Verify WHL (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-pypi
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install wheel
        run: python -m pip install --no-cache-dir dist/${{ needs.build-pypi.outputs.whl-name }}

      - name: Verify CLI version
        shell: bash
        run: |
          INSTALLED=$(nanodns --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          EXPECTED="${{ needs.build-pypi.outputs.version }}"
          [ "$INSTALLED" = "$EXPECTED" ] \
            && echo "✅ $INSTALLED" \
            || (echo "❌ $INSTALLED != $EXPECTED" && exit 1)

      - name: Smoke test
        shell: bash
        run: |
          nanodns init verify.json
          nanodns check verify.json
          echo "✅ init/check OK"


# ══════════════════════════════════════════════════════════════════════════════
# 4️⃣  CHANGELOG  (tag only — parallel with build-pypi, only needs tests gate)
#
#  Groups commits by conventional-commit prefix; annotates each with the
#  author's GitHub login (resolved via REST API using a parallel-friendly
#  batch approach to avoid N+1 sequential requests).
#
#  Sections (empty sections omitted automatically):
#    ⭐ New Features        feat:
#    ⚡️ Optimizations       perf: / refactor:
#    🐞 Bug Fixes           fix:
#    📚 Documentation       docs:
#    ⬆️  Dependency Updates  build: / deps:
#    🔨 Other Changes       everything else
# ══════════════════════════════════════════════════════════════════════════════
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: tests   # only needs the tag-push gate; runs parallel to build-pypi
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read   # git log + public GitHub Commits API

    outputs:
      previous-tag: ${{ steps.tags.outputs.previous }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag range
        id: tags
        run: |
          CURRENT="${GITHUB_REF_NAME}"
          PREVIOUS=$(git tag --sort=-version:refname \
                     | grep -E '^v[0-9]' \
                     | sed -n '2p')
          echo "current=${CURRENT}"   >> "$GITHUB_OUTPUT"
          echo "previous=${PREVIOUS}" >> "$GITHUB_OUTPUT"
          echo "Current : ${CURRENT}"
          echo "Previous: ${PREVIOUS:-<first release>}"

      - name: Build author map (batch API fetch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          PREV:     ${{ steps.tags.outputs.previous }}
        run: |
          # Collect all full hashes in the range into a newline-separated list,
          # then fetch each commit's GitHub login via the REST API.
          # We use `gh api` (built-in, handles auth + retries) instead of raw
          # curl to avoid manual token handling and respect rate-limit headers.
          RANGE="${PREV:+${PREV}..}HEAD"
          : > /tmp/authors.tsv

          git log ${RANGE} --format="%H %h" | while IFS=' ' read -r FULL SHORT; do
            LOGIN=$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPO}/commits/${FULL}" \
              --jq '.author.login // empty' 2>/dev/null || true)
            [ -n "$LOGIN" ] && printf '%s\t@%s\n' "$SHORT" "$LOGIN" >> /tmp/authors.tsv
          done

          echo "Author map:"
          cat /tmp/authors.tsv || true

      - name: Write CHANGELOG.md
        env:
          CURRENT:  ${{ steps.tags.outputs.current }}
          PREVIOUS: ${{ steps.tags.outputs.previous }}
          REPO:     ${{ github.repository }}
        run: |
          RANGE="${PREVIOUS:+${PREVIOUS}..}HEAD"
          DATE=$(date +'%Y-%m-%d')
          mkdir -p changelog

          # Append GitHub login to a "- message (hash)" line
          annotate() {
            while IFS= read -r line; do
              HASH=$(echo "$line" | grep -oE '\([a-f0-9]{7}\)' | tr -d '()')
              AUTHOR=$(grep "^${HASH}" /tmp/authors.tsv 2>/dev/null | cut -f2 || true)
              echo "$line${AUTHOR:+ ${AUTHOR}}"
            done
          }

          {
            echo "# Changelog"
            echo
            echo "## ${CURRENT} (${DATE})"
            echo

            FEATS=$(git log ${RANGE} --pretty=format:"- %s (%h)" --reverse \
                    | grep -E '^- feat(\([^)]+\))?:' \
                    | sed -E 's/^- feat(\([^)]+\))?:/- /' | annotate)
            [ -n "$FEATS" ] && { echo "### ⭐ New Features"; echo "$FEATS"; echo; }

            PERFS=$(git log ${RANGE} --pretty=format:"- %s (%h)" --reverse \
                    | grep -E '^- (perf|refactor)(\([^)]+\))?:' \
                    | sed -E 's/^- (perf|refactor)(\([^)]+\))?:/- /' | annotate)
            [ -n "$PERFS" ] && { echo "### ⚡️ Optimizations"; echo "$PERFS"; echo; }

            FIXES=$(git log ${RANGE} --pretty=format:"- %s (%h)" --reverse \
                    | grep -E '^- fix(\([^)]+\))?:' \
                    | sed -E 's/^- fix(\([^)]+\))?:/- /' | annotate)
            [ -n "$FIXES" ] && { echo "### 🐞 Bug Fixes"; echo "$FIXES"; echo; }

            DOCS=$(git log ${RANGE} --pretty=format:"- %s (%h)" --reverse \
                   | grep -E '^- docs(\([^)]+\))?:' \
                   | sed -E 's/^- docs(\([^)]+\))?:/- /' | annotate)
            [ -n "$DOCS" ] && { echo "### 📚 Documentation"; echo "$DOCS"; echo; }

            DEPS=$(git log ${RANGE} --pretty=format:"- %s (%h)" --reverse \
                   | grep -E '^- (build|deps)(\([^)]+\))?:' \
                   | sed -E 's/^- (build|deps)(\([^)]+\))?:/- /' | annotate)
            [ -n "$DEPS" ] && { echo "### ⬆️ Dependency Updates"; echo "$DEPS"; echo; }

            OTHERS=$(git log ${RANGE} --pretty=format:"- %s (%h)" --reverse \
                     | grep -vE '^- (feat|fix|docs|refactor|perf|build|deps)(\([^)]+\))?:' \
                     | annotate)
            [ -n "$OTHERS" ] && { echo "### 🔨 Other Changes"; echo "$OTHERS"; echo; }

            CONTRIBUTORS=$(cut -f2 /tmp/authors.tsv 2>/dev/null | sort -u | tr '\n' ' ')
            [ -n "$CONTRIBUTORS" ] && { echo "### 👥 Contributors"; echo "$CONTRIBUTORS"; echo; }

            [ -n "$PREVIOUS" ] && \
              echo "[Full Changelog](https://github.com/${REPO}/compare/${PREVIOUS}...${CURRENT})"

          } > changelog/CHANGELOG.md

          echo "--- CHANGELOG.md ---"
          cat changelog/CHANGELOG.md

      - uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: changelog/CHANGELOG.md
          retention-days: 3


# ══════════════════════════════════════════════════════════════════════════════
# 5️⃣  RELEASE SUMMARY  (tag only — gating job before github-release)
#
#  Uses `if: always()` so it runs even when upstream jobs fail, producing a
#  complete pass/fail report rather than being skipped silently.
#  Assembles release_body.md: changelog content + install snippets +
#  attestation verify commands + pipeline result tables.
# ══════════════════════════════════════════════════════════════════════════════
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs:
      - build-pypi
      - verify-whl
      - changelog
      - build-docker
      - verify-docker
      - scan
      - sign
      - verify-signature
    if: always() && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: changelog
          path: /tmp/changelog/

      - name: Assemble release body and step summary
        env:
          VERSION:     ${{ needs.build-pypi.outputs.version }}
          DIGEST:      ${{ needs.build-docker.outputs.digest }}
          GHCR:        ${{ env.GHCR_IMAGE }}
          REPO:        ${{ github.repository }}
          REF_NAME:    ${{ github.ref_name }}
          SHA:         ${{ github.sha }}
          R_BUILD:     ${{ needs.build-pypi.result }}
          R_WHL:       ${{ needs.verify-whl.result }}
          R_CHANGELOG: ${{ needs.changelog.result }}
          R_DOCKER:    ${{ needs.build-docker.result }}
          R_VERIFY:    ${{ needs.verify-docker.result }}
          R_SCAN:      ${{ needs.scan.result }}
          R_SIGN:      ${{ needs.sign.result }}
          R_SIGVER:    ${{ needs.verify-signature.result }}
        shell: python
        run: |
          import os, pathlib, textwrap

          e        = os.environ
          version  = e["VERSION"]
          digest   = e["DIGEST"]
          image    = e["GHCR"]
          repo     = e["REPO"]
          ref      = e["REF_NAME"]
          sha      = e["SHA"]

          results = {
              "build":     e["R_BUILD"],
              "whl":       e["R_WHL"],
              "changelog": e["R_CHANGELOG"],
              "docker":    e["R_DOCKER"],
              "verify":    e["R_VERIFY"],
              "scan":      e["R_SCAN"],
              "sign":      e["R_SIGN"],
              "sigver":    e["R_SIGVER"],
          }
          ICONS = {"success": "✅", "failure": "❌", "skipped": "⏭️", "cancelled": "🚫"}
          row = lambda label, k: f"| {label} | {ICONS.get(results[k], '⚪')} `{results[k]}` |"
          all_ok  = all(results[k] == "success" for k in ["whl", "docker", "scan", "sign"])
          overall = "✅ All checks passed" if all_ok else "⚠️ Some checks failed"

          # Changelog from artifact (already formatted markdown)
          cl = pathlib.Path("/tmp/changelog/CHANGELOG.md")
          changelog_md = cl.read_text().rstrip() if cl.exists() else "_Changelog unavailable._"

          # ── release_body.md ───────────────────────────────────────────────
          body = [
              changelog_md, "",
              "---", "",
              "## 📦 Install", "",
              "```bash",
              f"pip install nanodns=={version}", "```", "",
              "```bash",
              f"docker pull {image}:{version}", "```",
          ]
          if digest:
              body += ["", "```bash",
                       "# Pin to immutable digest",
                       f"docker pull {image}@{digest}", "```"]
          body += [
              "", "---", "",
              "## 🔏 Verify authenticity", "",
              "**PyPI wheel** — GitHub signed provenance:",
              "```bash",
              f"gh attestation verify nanodns-{version}-py3-none-any.whl --repo {repo}",
              "```", "",
              "**OCI image** — GitHub signed provenance:",
              "```bash",
              f"gh attestation verify oci://{image}:{version} --repo {repo}",
              "```", "",
              "**OCI image** — Cosign keyless (Sigstore):",
              "```bash",
              "cosign verify \\",
              f'  --certificate-identity-regexp="https://github.com/{repo}/.github/workflows/release.yml@refs/tags/.*" \\',
              '  --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \\',
              f"  {image}:{version}",
              "```", "",
              "---", "",
              f"## 🔍 Pipeline — {overall}", "",
              "### 📦 PyPI",
              "| Step | Result |", "|---|---|",
              row("Build distribution",            "build"),
              row("Verify wheel (3 OS)",           "whl"),
              "",
              "### 📝 Changelog",
              "| Step | Result |", "|---|---|",
              row("Generate changelog",            "changelog"),
              "",
              "### 🐳 Docker",
              "| Step | Result |", "|---|---|",
              row("Build & push OCI image",        "docker"),
              row("GitHub attestation",            "docker"),
              row("Runtime verification",          "verify"),
              row("Vulnerability scan (Trivy)",    "scan"),
              row("Cosign keyless signature",      "sign"),
              row("Verify signature & provenance", "sigver"),
          ]
          pathlib.Path("/tmp/release_body.md").write_text("\n".join(body) + "\n")
          print("✅ release_body.md written")

          # ── GITHUB_STEP_SUMMARY ───────────────────────────────────────────
          summary = [
              f"## 🚀 NanoDNS {ref} — {overall}", "",
              "| | |", "|---|---|",
              f"| **Version** | `{version}` |",
              f"| **Commit**  | `{sha[:12]}` |",
              "",
              "### 📦 PyPI",
              "| Step | Result |", "|---|---|",
              row("Build distribution",            "build"),
              row("Verify wheel (3 OS)",           "whl"),
              "",
              "### 📝 Changelog",
              "| Step | Result |", "|---|---|",
              row("Generate changelog",            "changelog"),
              "",
              "### 🐳 Docker",
              "| Step | Result |", "|---|---|",
              row("Build & push OCI image",        "docker"),
              row("GitHub attestation",            "docker"),
              row("Runtime verification",          "verify"),
              row("Vulnerability scan (Trivy)",    "scan"),
              row("Cosign keyless signature",      "sign"),
              row("Verify signature & provenance", "sigver"),
          ]
          if digest:
              summary += ["", "🐳 **Immutable digest:**",
                          "```", f"docker pull {image}@{digest}", "```"]
          pathlib.Path(e["GITHUB_STEP_SUMMARY"]).write_text("\n".join(summary) + "\n")
          print("✅ GITHUB_STEP_SUMMARY written")

      - uses: actions/upload-artifact@v4
        with:
          name: release-body
          path: /tmp/release_body.md
          retention-days: 1   # consumed immediately by github-release


# ══════════════════════════════════════════════════════════════════════════════
# 6️⃣  GITHUB RELEASE  (tag only, after summary)
# ══════════════════════════════════════════════════════════════════════════════
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: summary    # transitive: summary already needs verify-whl + changelog
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write   # create release + upload assets

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/         # contains wheel, sdist, SHA256SUMS

      - uses: actions/download-artifact@v4
        with:
          name: release-body
          path: /tmp/

      - uses: actions/download-artifact@v4
        with:
          name: changelog
          path: /tmp/changelog/   # attach CHANGELOG.md as a release asset

      - uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "NanoDNS ${{ github.ref_name }}"
          body_path:  /tmp/release_body.md
          draft:      false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            /tmp/changelog/CHANGELOG.md


# ══════════════════════════════════════════════════════════════════════════════
# 7️⃣  PUBLISH TO PyPI  (tag only, after GitHub release is created)
# ══════════════════════════════════════════════════════════════════════════════
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: github-release
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write   # OIDC trusted publishing
      contents: read

    environment:
      name: pypi
      url:  https://pypi.org/project/nanodns/

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: false
          verbose: true


# ══════════════════════════════════════════════════════════════════════════════
# 8️⃣  VERIFY PyPI PACKAGE  (tag only, after publish)
#
#  Uses a retry loop instead of a fixed sleep to avoid wasting 90 s when the
#  package propagates quickly (typically 10-30 s on PyPI's CDN).
# ══════════════════════════════════════════════════════════════════════════════
  verify-pypi:
    name: Verify PyPI Package
    runs-on: ubuntu-latest
    needs: [publish-pypi, build-pypi]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for PyPI propagation (retry loop, max 3 min)
        env:
          VERSION: ${{ needs.build-pypi.outputs.version }}
        run: |
          for i in $(seq 1 18); do
            echo "Attempt ${i}/18 — checking PyPI index..."
            if pip index versions nanodns 2>/dev/null | grep -q "${VERSION}"; then
              echo "✅ Version ${VERSION} is visible on PyPI"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Timed out waiting for PyPI propagation" && exit 1

      - name: Install from PyPI and smoke test
        env:
          VERSION: ${{ needs.build-pypi.outputs.version }}
        run: |
          pip install --no-cache-dir \
            --index-url https://pypi.org/simple \
            "nanodns==${VERSION}"
          INSTALLED=$(nanodns --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          [ "$INSTALLED" = "$VERSION" ] \
            && echo "✅ PyPI $INSTALLED" \
            || (echo "❌ $INSTALLED != $VERSION" && exit 1)
          nanodns init smoke.json
          nanodns check smoke.json
          echo "✅ PyPI smoke test passed"


# ══════════════════════════════════════════════════════════════════════════════
# 9️⃣  BUILD & PUSH DOCKER IMAGE  (tag + main, skip PR)
#
#  On tag:  pushes semver tags (1.2.3, 1.2, 1) + sha tag
#  On main: pushes `edge` tag only (NOT `latest`) to avoid overwriting the
#           last stable release tag with an unreleased main-branch build.
#  `latest` is only set on tag pushes via `enable={{is_default_branch}}=false`
#  combined with explicit raw tag on semver events.
# ══════════════════════════════════════════════════════════════════════════════
  build-docker:
    name: Build & Push OCI Image
    runs-on: ubuntu-latest
    needs: tests
    if: >-
      github.event_name != 'pull_request' &&
      needs.tests.outputs.result != 'skipped' &&
      needs.tests.outputs.skip_docker != 'true'

    permissions:
      contents: read
      packages:     write   # push to GHCR
      id-token:     write   # actions/attest-build-provenance OIDC
      attestations: write   # actions/attest-build-provenance store

    outputs:
      digest:  ${{ steps.build.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # DockerHub login is skipped when DOCKERHUB_USERNAME secret is not set
      - name: Login DockerHub
        if: env.DOCKERHUB_IMAGE != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE != '' && env.DOCKERHUB_IMAGE || '' }}
          tags: |
            # On version tag: semver variants + latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # On main branch push: edge tag only (never overwrites latest)
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            # Always: short SHA for traceability
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=NanoDNS
            org.opencontainers.image.description=Lightweight JSON-configurable DNS server
            org.opencontainers.image.vendor=NanoDNS Contributors
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build & Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            GIT_REVISION=${{ github.sha }}
            REPO_URL=https://github.com/${{ github.repository }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache,mode=max
          provenance: true
          sbom: true

      # Provenance attestation — verify with:
      #   gh attestation verify oci://ghcr.io/<owner>/nanodns:<tag> --repo <owner>/nanodns
      # Complements (does not replace) the cosign keyless signature in job 1️⃣1️⃣.
      - name: Attest OCI image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name:     ${{ env.GHCR_IMAGE }}
          subject-digest:   ${{ steps.build.outputs.digest }}
          push-to-registry: true   # co-locate attestation with image in GHCR


# ══════════════════════════════════════════════════════════════════════════════
# 🔟  VERIFY DOCKER RUNTIME  (non-PR only, depends on build-docker)
# ══════════════════════════════════════════════════════════════════════════════
  verify-docker:
    name: Verify Docker Runtime
    runs-on: ubuntu-latest
    needs: build-docker
    # build-docker already skips on PR; this inherits that skip transitively.
    # The explicit condition is retained for clarity and future-proofing.
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: read   # pull from GHCR

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image by digest
        run: docker pull ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}

      - name: Verify CLI (distroless-compatible via python -m)
        run: |
          docker run --rm \
            --entrypoint /usr/bin/python \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            -m nanodns.cli --version

      - name: Functional DNS test
        run: |
          cat > /tmp/test.json <<'CONF'
          {
            "server": {
              "host": "0.0.0.0", "port": 53, "upstream": ["8.8.8.8"],
              "upstream_port": 53, "upstream_timeout": 3,
              "log_queries": false, "hot_reload": false,
              "cache_enabled": true, "cache_ttl": 300, "cache_size": 200,
              "log_level": "WARNING"
            },
            "zones": {"verify.lan": {}},
            "records": [{"name":"ping.verify.lan","type":"A","value":"1.2.3.4","ttl":60}],
            "rewrites": []
          }
          CONF

          docker run -d --name dns-test \
            --cap-add NET_BIND_SERVICE \
            -p 5399:53/udp \
            -v /tmp/test.json:/etc/nanodns.json:ro \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            start --config /etc/nanodns.json

          sleep 5
          sudo apt-get install -y -qq dnsutils
          RESULT=$(dig @127.0.0.1 -p 5399 ping.verify.lan A +short +time=3)
          docker stop dns-test && docker rm dns-test

          [ "$RESULT" = "1.2.3.4" ] \
            && echo "✅ DNS resolved: $RESULT" \
            || (echo "❌ Expected 1.2.3.4 got: $RESULT" && exit 1)

      - name: Verify OCI labels
        run: |
          IMAGE="${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}"
          MISSING=0
          for label in \
            org.opencontainers.image.title \
            org.opencontainers.image.version \
            org.opencontainers.image.created \
            org.opencontainers.image.source \
            org.opencontainers.image.revision \
            org.opencontainers.image.licenses; do
            VALUE=$(docker inspect "$IMAGE" \
              --format "{{ index .Config.Labels \"$label\" }}")
            if [ -z "$VALUE" ]; then
              echo "❌ Missing: $label"; MISSING=$((MISSING+1))
            else
              echo "✅ $label = $VALUE"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

      - name: Verify non-root user
        run: |
          USER=$(docker inspect \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            --format '{{ .Config.User }}')
          echo "Container user: ${USER:-<default>}"
          [[ "$USER" == "root" || "$USER" == "0" ]] \
            && echo "⚠️  WARNING: runs as root" \
            || echo "✅ non-root"


# ══════════════════════════════════════════════════════════════════════════════
# 1️⃣1️⃣  VULNERABILITY SCAN  (non-PR only)
# ══════════════════════════════════════════════════════════════════════════════
  scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      security-events: write   # upload SARIF results to GitHub Security tab

    steps:
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref:    ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}
          severity:     CRITICAL,HIGH
          exit-code:    1
          format:       sarif
          output:       trivy-results.sarif

      - name: Upload Trivy SARIF to GitHub Security
        if: always()   # upload even on scan failure so results are visible
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif


# ══════════════════════════════════════════════════════════════════════════════
# 1️⃣2️⃣  COSIGN KEYLESS SIGN  (tag only)
# ══════════════════════════════════════════════════════════════════════════════
  sign:
    name: Sign Image (Cosign Keyless)
    runs-on: ubuntu-latest
    needs: [build-docker, verify-docker, scan]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write   # OIDC for keyless signing
      packages: write   # push signature to GHCR

    steps:
      - uses: sigstore/cosign-installer@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}


# ══════════════════════════════════════════════════════════════════════════════
# 1️⃣3️⃣  VERIFY SIGNATURE + PROVENANCE  (tag only)
# ══════════════════════════════════════════════════════════════════════════════
  verify-signature:
    name: Verify Signature & Provenance
    runs-on: ubuntu-latest
    needs: [sign, build-docker]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token:     write   # cosign OIDC
      packages:     read    # pull from GHCR
      attestations: read    # gh attestation verify

    steps:
      - uses: sigstore/cosign-installer@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify cosign signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }}
          echo "✅ cosign signature OK"

      - name: Verify SLSA provenance (docker/build-push-action)
        run: |
          cosign verify-attestation \
            --type slsaprovenance02 \
            --certificate-identity-regexp="https://github.com/docker/build-push-action@.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            && echo "✅ SLSA provenance OK" \
            || echo "⚠️  SLSA provenance not found in Sigstore (non-fatal)"

      - name: Verify GitHub attestation (actions/attest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify \
            oci://${{ env.GHCR_IMAGE }}@${{ needs.build-docker.outputs.digest }} \
            --repo ${{ github.repository }}
          echo "✅ GitHub attestation OK"
