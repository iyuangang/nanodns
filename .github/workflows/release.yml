name: Release & Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read  # default read-only
  id-token: none

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ─────────────────────────────────────────────
  # Tests (reuse shared workflow)
  # ─────────────────────────────────────────────
  tests:
    name: Run Tests
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  # ─────────────────────────────────────────────
  # Build
  # ─────────────────────────────────────────────
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: tests

    permissions:
      contents: read

    outputs:
      version: ${{ steps.version.outputs.version }}
      whl-name: ${{ steps.filenames.outputs.whl }}
      sdist-name: ${{ steps.filenames.outputs.sdist }}

    env:
      PYTHONHASHSEED: "0"
      SOURCE_DATE_EPOCH: ${{ github.event.head_commit.timestamp }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip (isolated)
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade build twine

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify pyproject.toml version matches tag
        run: |
          PROJECT_VERSION=$(python - <<EOF
          import tomllib
          with open("pyproject.toml","rb") as f:
            print(tomllib.load(f)["project"]["version"])
          EOF
          )
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch"
            exit 1
          fi

      - name: Clean previous builds
        run: rm -rf dist build *.egg-info

      - name: Build sdist and wheel (reproducible)
        run: python -m build --sdist --wheel

      - name: Twine check
        run: twine check dist/*

      - name: Generate SHA256 checksums
        run: sha256sum dist/* > dist/SHA256SUMS

      - name: Capture filenames
        id: filenames
        run: |
          echo "whl=$(basename dist/*.whl)" >> $GITHUB_OUTPUT
          echo "sdist=$(basename dist/*.tar.gz)" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  # ─────────────────────────────────────────────
  # Verify WHL cross-platform
  # ─────────────────────────────────────────────
  verify-whl:
    name: Verify WHL (${{ matrix.os }} / Py ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: build

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]

    permissions:
      contents: read

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install wheel (no cache)
        run: |
          python -m pip install --no-cache-dir dist/${{ needs.build.outputs.whl-name }}

      - name: Verify CLI version
        shell: bash
        run: |
          INSTALLED=$(nanodns --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          EXPECTED="${{ needs.build.outputs.version }}"
          [ "$INSTALLED" = "$EXPECTED" ]

      - name: Smoke test
        shell: bash
        run: |
          nanodns init verify.json
          nanodns check verify.json

  # ─────────────────────────────────────────────
  # GitHub Release
  # ─────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: verify-whl

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)")
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          fi
          {
            echo "changelog<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "NanoDNS ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS

  # ─────────────────────────────────────────────
  # Publish to PyPI (Trusted Publishing OIDC)
  # ─────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: github-release

    permissions:
      id-token: write   # REQUIRED for OIDC
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/project/nanodns-server/

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: false
          verbose: true

  # ─────────────────────────────────────────────
  # Verify from public PyPI index
  # ─────────────────────────────────────────────
  verify-pypi:
    name: Verify PyPI Package
    runs-on: ubuntu-latest
    needs: publish-pypi

    permissions:
      contents: read

    steps:
      - name: Wait for propagation
        run: sleep 90

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from public PyPI
        run: |
          python -m pip install --no-cache-dir \
            --index-url https://pypi.org/simple \
            "nanodns-server==${{ needs.build.outputs.version }}"

      - name: Smoke test
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          INSTALLED=$(nanodns --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          [ "$INSTALLED" = "$VERSION" ]
          nanodns init smoke.json
          nanodns check smoke.json
