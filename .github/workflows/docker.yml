name: Build & Publish Hardened OCI Image

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/nanodns
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nanodns

permissions:
  contents: read
  packages: write
  id-token: write

jobs:

# ─────────────────────────────────────────────
# 1️⃣ Run Tests First
# ─────────────────────────────────────────────
  tests:
    uses: ./.github/workflows/test.yml


# ─────────────────────────────────────────────
# 2️⃣ Build & Push Multi-Arch Image
# ─────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: tests

    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=NanoDNS
            org.opencontainers.image.description=Lightweight JSON-configurable DNS server
            org.opencontainers.image.vendor=NanoDNS Contributors
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build & Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            GIT_REVISION=${{ github.sha }}
            REPO_URL=https://github.com/${{ github.repository }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache,mode=max
          provenance: true
          sbom: true

# ─────────────────────────────────────────────
# 3️⃣ Runtime Verification (amd64)
# ─────────────────────────────────────────────
  verify-runtime:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull by Digest
        run: docker pull ${{ env.GHCR_IMAGE }}@${{ needs.docker.outputs.digest }}

      # Fix 1: Chainguard distroless 里没有 nanodns 脚本，用 python -m 替代
      - name: Verify CLI
        run: |
          docker run --rm \
            --entrypoint /usr/bin/python \
            ${{ env.GHCR_IMAGE }}@${{ needs.docker.outputs.digest }} \
            -m nanodns.cli --version

      - name: Functional DNS Test
        run: |
          cat > test.json <<'CONF'
          {
            "server": {
              "host": "0.0.0.0", "port": 53,
              "upstream": ["8.8.8.8"], "upstream_port": 53,
              "upstream_timeout": 3, "log_queries": false,
              "hot_reload": false, "cache_enabled": true,
              "cache_ttl": 300, "cache_size": 200,
              "log_level": "WARNING"
            },
            "zones": {"verify.lan": {}},
            "records": [{"name":"ping.verify.lan","type":"A","value":"1.2.3.4","ttl":60}],
            "rewrites": []
          }
          CONF

          # Fix 2: 挂载到容器里实际读取的路径 /etc/nanodns.json
          #        并显式传入 CMD 覆盖（不依赖默认 CMD）
          docker run -d --name dns-test \
            --cap-add NET_BIND_SERVICE \
            -p 5399:53/udp \
            -v $PWD/test.json:/etc/nanodns.json:ro \
            ${{ env.GHCR_IMAGE }}@${{ needs.docker.outputs.digest }} \
            start --config /etc/nanodns.json

          sleep 5
          sudo apt-get update -qq
          sudo apt-get install -y dnsutils -qq
          RESULT=$(dig @127.0.0.1 -p 5399 ping.verify.lan A +short +time=3)

          docker stop dns-test
          docker rm dns-test

          [ "$RESULT" = "1.2.3.4" ] \
            && echo "✅ DNS resolved: $RESULT" \
            || (echo "❌ Expected 1.2.3.4 got: $RESULT" && exit 1)


# ─────────────────────────────────────────────
# 4️⃣ Vulnerability Scan
# ─────────────────────────────────────────────
  scan:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'

    steps:
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.GHCR_IMAGE }}@${{ needs.docker.outputs.digest }}
          severity: CRITICAL,HIGH
          exit-code: 1


# ─────────────────────────────────────────────
# 5️⃣ Cosign Sign (Tag Only)
# ─────────────────────────────────────────────
  sign:
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: sigstore/cosign-installer@v3

      - name: Sign Image (Keyless)
        run: |
          cosign sign --yes \
            ${{ env.GHCR_IMAGE }}@${{ needs.docker.outputs.digest }}


# ─────────────────────────────────────────────
# 6️⃣ Verify Signature + Provenance
# ─────────────────────────────────────────────
  verify-signature:
    runs-on: ubuntu-latest
    needs: [docker, sign]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: sigstore/cosign-installer@v3

      - name: Verify Signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.GHCR_IMAGE }}@${{ needs.docker.outputs.digest }}

      - name: Verify Provenance
        run: |
          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.GHCR_IMAGE }}@${{ needs.docker.outputs.digest }}


# ─────────────────────────────────────────────
# 7️⃣ Release Summary (Tag Only)
# ─────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    needs: [docker, verify-runtime, scan]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - run: |
          echo "## 🐳 NanoDNS Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ needs.docker.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Runtime | ${{ needs.verify-runtime.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | ${{ needs.scan.result }} |" >> $GITHUB_STEP_SUMMARY