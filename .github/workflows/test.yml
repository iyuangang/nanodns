name: Tests

# ──────────────────────────────────────────────────────────────────────────────
# Commit prefix convention
# ──────────────────────────────────────────────────────────────────────────────
#
#  Prefix          Tests   Docker build   PyPI release
#  ─────────────── ─────── ────────────── ─────────────
#  feat:           ✅       ✅ (on main)   🏷️ (on tag)
#  fix:            ✅       ✅             🏷️
#  perf:           ✅       ✅             🏷️
#  refactor:       ✅       ✅             🏷️
#  test:           ✅       ⏭️  skip       ⏭️
#  ci:             ✅       ⏭️  skip       ⏭️
#  build:          ✅       ⏭️  skip       ⏭️
#  docs:           ⏭️ skip  ⏭️  skip       ⏭️
#  style:          ⏭️ skip  ⏭️  skip       ⏭️
#  chore:          ⏭️ skip  ⏭️  skip       ⏭️
#
#  Tags (v*) always run the full pipeline regardless of commit prefix.
#
# This file handles:  Tests + skip logic + summary
# release.yml reads:  tests.outputs.result + tests.outputs.skip_docker
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_call:
    outputs:
      result:
        description: "success | failure | skipped"
        value: ${{ jobs.summarize.outputs.result }}
      skip_docker:
        description: "true when commit is test:/ci:/build: (no code change warrants image rebuild)"
        value: ${{ jobs.check-commit.outputs.skip_docker }}

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Guard ─────────────────────────────────────────────────────────────────
  check-commit:
    name: Classify commit
    runs-on: ubuntu-latest
    outputs:
      skip_tests:  ${{ steps.classify.outputs.skip_tests }}
      skip_docker: ${{ steps.classify.outputs.skip_docker }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Classify commit prefixes
        id: classify
        run: |
          # Tags always run everything
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "skip_tests=false"  >> $GITHUB_OUTPUT
            echo "skip_docker=false" >> $GITHUB_OUTPUT
            echo "▶ Tag push — full pipeline"
            exit 0
          fi

          MESSAGES=$(git log --format="%s" HEAD~1..HEAD 2>/dev/null \
                     || git log --format="%s" -1)
          echo "Commits in this push:"
          echo "$MESSAGES"

          # Prefixes that skip tests entirely (and therefore also Docker/PyPI)
          SKIP_TESTS_PAT="^(docs|style|chore)(\(.+\))?(!)?:"

          # Prefixes that run tests but skip Docker image rebuild
          # (no production code changed, image content is identical)
          SKIP_DOCKER_PAT="^(test|ci|build)(\(.+\))?(!)?:"

          TOTAL=$(echo "$MESSAGES" | wc -l)
          SKIP_T=$(echo "$MESSAGES" | grep -cE "$SKIP_TESTS_PAT"  || true)
          SKIP_D=$(echo "$MESSAGES" | grep -cE "$SKIP_DOCKER_PAT" || true)

          if [ "$SKIP_T" -eq "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
            echo "skip_tests=true"  >> $GITHUB_OUTPUT
            echo "skip_docker=true" >> $GITHUB_OUTPUT
            echo "⏭ All commits match skip-tests pattern (docs/style/chore)"
          elif [ "$((SKIP_T + SKIP_D))" -eq "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
            echo "skip_tests=false"  >> $GITHUB_OUTPUT
            echo "skip_docker=true"  >> $GITHUB_OUTPUT
            echo "▶ Tests will run  ⏭ Docker will be skipped (test/ci/build commit)"
          else
            echo "skip_tests=false"  >> $GITHUB_OUTPUT
            echo "skip_docker=false" >> $GITHUB_OUTPUT
            echo "▶ Full pipeline (feat/fix/perf/refactor or mixed)"
          fi

  # ─── Unit Tests ────────────────────────────────────────────────────────────
  unit:
    name: Unit (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: check-commit
    if: needs.check-commit.outputs.skip_tests != 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e .

      - name: Run unit tests
        id: pytest
        continue-on-error: true
        run: |
          pytest tests/ -v --cov=nanodns --cov-report=term-missing --cov-report=xml:coverage-${{ matrix.os }}-${{ matrix.python-version }}.xml --cov-fail-under=85

      - name: Report result to artifact
        if: always()
        shell: bash
        run: |
          mkdir -p results
          echo "{\"suite\":\"unit\",\"os\":\"${{ matrix.os }}\",\"py\":\"${{ matrix.python-version }}\",\"result\":\"${{ steps.pytest.outcome }}\"}" \
            > results/unit-${{ matrix.os }}-${{ matrix.python-version }}.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-result-unit-${{ matrix.os }}-${{ matrix.python-version }}
          path: results/
          retention-days: 1

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-*.xml
          retention-days: 7

      - name: Fail if tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1

  # ─── Integration Tests ─────────────────────────────────────────────────────
  integration:
    name: Integration (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: check-commit
    if: needs.check-commit.outputs.skip_tests != 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -e .

      - name: Run integration tests
        id: pytest
        continue-on-error: true
        run: pytest tests/test_integration.py -v --tb=short

      - name: Report result to artifact
        if: always()
        shell: bash
        run: |
          mkdir -p results
          echo "{\"suite\":\"integration\",\"os\":\"${{ matrix.os }}\",\"py\":\"${{ matrix.python-version }}\",\"result\":\"${{ steps.pytest.outcome }}\"}" \
            > results/integration-${{ matrix.os }}-${{ matrix.python-version }}.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-result-integration-${{ matrix.os }}-${{ matrix.python-version }}
          path: results/
          retention-days: 1

      - name: Fail if tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1

  # ─── Summarize ─────────────────────────────────────────────────────────────
  summarize:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [check-commit, unit, integration]
    if: always()
    outputs:
      result: ${{ steps.outcome.outputs.result }}

    steps:
      - name: Download all result artifacts
        # Will silently succeed even when no artifacts exist (skipped run)
        uses: actions/download-artifact@v4
        with:
          pattern: test-result-*
          path: all-results/
          merge-multiple: true
        continue-on-error: true

      - name: Build dynamic matrix summary
        id: outcome
        shell: python
        run: |
          import json, os, pathlib

          skip_tests  = "${{ needs.check-commit.outputs.skip_tests }}"  == "true"
          skip_docker = "${{ needs.check-commit.outputs.skip_docker }}" == "true"

          results_dir = pathlib.Path("all-results")
          records = []
          if results_dir.exists():
              for f in results_dir.glob("*.json"):
                  try:
                      records.append(json.loads(f.read_text()))
                  except Exception:
                      pass

          def icon(r):
              return {"success": "✅", "failure": "❌", "skipped": "⏭️"}.get(r, "⚪")

          unit_records = [r for r in records if r["suite"] == "unit"]
          intg_records = [r for r in records if r["suite"] == "integration"]

          unit_oses = sorted({r["os"] for r in unit_records})
          unit_pys  = sorted({r["py"] for r in unit_records})
          intg_oses = sorted({r["os"] for r in intg_records})
          intg_pys  = sorted({r["py"] for r in intg_records})
          lookup    = {(r["suite"], r["os"], r["py"]): r["result"] for r in records}

          all_results = [r["result"] for r in records]
          if skip_tests:
              overall = "skipped"
          elif not all_results:
              overall = "skipped"
          elif any(r == "failure" for r in all_results):
              overall = "failure"
          else:
              overall = "success"

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"result={overall}\n")

          badge = {
              "success": "✅ All tests passed",
              "failure": "❌ Tests failed",
              "skipped": "⏭️ Tests skipped",
          }.get(overall, "⚪ Unknown")

          lines = []
          a = lines.append

          a(f"## {badge}")
          a("")
          a(
            f"**Trigger:** `${{ github.event_name }}` · "
            f"**Ref:** `${{ github.ref_name }}` · "
            f"**SHA:** `${{ github.sha }}`"
          )
          a("")

          # ── Commit classification legend ───────────────────────────────────
          a("### 📋 Commit Classification")
          a("")
          a("| Prefix | Tests | Docker | PyPI |")
          a("|---|---|---|---|")
          a("| `feat` `fix` `perf` `refactor` | ✅ | ✅ | 🏷️ on tag |")
          a("| `test` `ci` `build` | ✅ | ⏭️ skip | ⏭️ skip |")
          a("| `docs` `style` `chore` | ⏭️ skip | ⏭️ skip | ⏭️ skip |")
          a("")
          skip_d_icon = "⏭️ skipped" if skip_docker else "✅ will run"
          skip_t_icon = "⏭️ skipped" if skip_tests  else "✅ ran"
          a(f"> This run — Tests: **{skip_t_icon}** · Docker: **{skip_d_icon}**")
          a("")

          if skip_tests:
              a("_Tests were skipped for this commit. No matrix results to show._")
          else:
              # ── Unit matrix ────────────────────────────────────────────────
              a("### 🧪 Unit Tests")
              a("")
              if unit_records:
                  header = "| OS | " + " | ".join(f"py{p}" for p in unit_pys) + " |"
                  sep    = "|---|" + "---|" * len(unit_pys)
                  a(header); a(sep)
                  for os_name in unit_oses:
                      cells = " | ".join(
                          icon(lookup.get(("unit", os_name, py), "⚪"))
                          for py in unit_pys
                      )
                      a(f"| `{os_name}` | {cells} |")
              else:
                  a("_No results_")
              a("")

              # ── Integration matrix ─────────────────────────────────────────
              a("### 🔗 Integration Tests")
              a("")
              if intg_records:
                  header = "| OS | " + " | ".join(f"py{p}" for p in intg_pys) + " |"
                  sep    = "|---|" + "---|" * len(intg_pys)
                  a(header); a(sep)
                  for os_name in intg_oses:
                      cells = " | ".join(
                          icon(lookup.get(("integration", os_name, py), "⚪"))
                          for py in intg_pys
                      )
                      a(f"| `{os_name}` | {cells} |")
              else:
                  a("_No results_")
              a("")

              # ── Overall ────────────────────────────────────────────────────
              unit_ok = bool(unit_records) and all(
                  lookup.get(("unit", o, p)) == "success"
                  for o in unit_oses for p in unit_pys
              )
              intg_ok = bool(intg_records) and all(
                  lookup.get(("integration", o, p)) == "success"
                  for o in intg_oses for p in intg_pys
              )
              a("### 📊 Overall")
              a("")
              a("| Suite | Matrix | Result |")
              a("|---|---|---|")
              a(f"| Unit | {len(unit_oses)}×OS × {len(unit_pys)}×Py ({len(unit_records)} legs) | {icon('success' if unit_ok else 'failure')} |")
              a(f"| Integration | {len(intg_oses)}×OS × {len(intg_pys)}×Py ({len(intg_records)} legs) | {icon('success' if intg_ok else 'failure')} |")

          pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text("\n".join(lines) + "\n")
          print("\n".join(lines))

      - name: Fail if tests failed
        if: steps.outcome.outputs.result == 'failure'
        run: exit 1