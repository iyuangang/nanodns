name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

  # Allow other workflows to call this one as a reusable workflow
  workflow_call:
    outputs:
      result:
        description: "Test outcome: success or failure"
        value: ${{ jobs.summarize.outputs.result }}

# Skip runs triggered only by non-code commits
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Guard: skip docs/style/chore-only pushes ──────────────────────────────
  check-commit:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.filter.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect skip-worthy commit messages
        id: filter
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          MESSAGES=$(git log --format="%s" HEAD~1..HEAD 2>/dev/null || git log --format="%s" -1)
          SKIP_PATTERN="^(docs|style|chore|ci|build)(\(.+\))?(!)?:"
          TOTAL=$(echo "$MESSAGES" | wc -l)
          SKIP_COUNT=$(echo "$MESSAGES" | grep -cE "$SKIP_PATTERN" || true)
          if [ "$SKIP_COUNT" -eq "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  # ─── Unit Tests ────────────────────────────────────────────────────────────
  unit:
    name: Unit (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: check-commit
    if: needs.check-commit.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e .

      - name: Run unit tests
        id: pytest
        # Use continue-on-error so the report step always runs,
        # then re-fail via the outcome check below.
        continue-on-error: true
        run: |
          pytest tests/ -v --cov=nanodns --cov-report=term-missing --cov-report=xml:coverage-${{ matrix.os }}-${{ matrix.python-version }}.xml --cov-fail-under=85

      # Each matrix leg writes one JSON line to a uniquely named artifact.
      # summary job downloads all of them and builds the table dynamically —
      # no hardcoded OS/version lists anywhere.
      - name: Report result to artifact
        if: always()
        shell: bash
        run: |
          RESULT="${{ steps.pytest.outcome }}"
          OS="${{ matrix.os }}"
          PY="${{ matrix.python-version }}"
          SUITE="unit"
          mkdir -p results
          echo "{\"suite\":\"${SUITE}\",\"os\":\"${OS}\",\"py\":\"${PY}\",\"result\":\"${RESULT}\"}" \
            > results/${SUITE}-${OS}-${PY}.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          # Unique name per leg so parallel uploads don't collide
          name: test-result-unit-${{ matrix.os }}-${{ matrix.python-version }}
          path: results/
          retention-days: 1

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-*.xml
          retention-days: 7

      # Re-fail the job if pytest failed (after artifact upload)
      - name: Fail if tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1

  # ─── Integration Tests ─────────────────────────────────────────────────────
  integration:
    name: Integration (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: check-commit
    if: needs.check-commit.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]       # matrix axis so summary reads it dynamically
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -e .

      - name: Run integration tests
        id: pytest
        continue-on-error: true
        run: pytest tests/test_integration.py -v --tb=short

      - name: Report result to artifact
        if: always()
        shell: bash
        run: |
          RESULT="${{ steps.pytest.outcome }}"
          OS="${{ matrix.os }}"
          PY="${{ matrix.python-version }}"
          SUITE="integration"
          mkdir -p results
          echo "{\"suite\":\"${SUITE}\",\"os\":\"${OS}\",\"py\":\"${PY}\",\"result\":\"${RESULT}\"}" \
            > results/${SUITE}-${OS}-${PY}.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-result-integration-${{ matrix.os }}-${{ matrix.python-version }}
          path: results/
          retention-days: 1

      - name: Fail if tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1

  # ─── Summarize ─────────────────────────────────────────────────────────────
  summarize:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit, integration]
    if: always()
    outputs:
      result: ${{ steps.outcome.outputs.result }}

    steps:
      # Download all per-leg result artifacts into one directory
      - name: Download all result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-result-*
          path: all-results/
          merge-multiple: true

      - name: Build dynamic matrix summary
        id: outcome
        shell: python
        run: |
          import json, os, pathlib, collections

          results_dir = pathlib.Path("all-results")
          records = []
          for f in results_dir.glob("*.json"):
              try:
                  records.append(json.loads(f.read_text()))
              except Exception:
                  pass

          def icon(r):
              return {"success": "✅", "failure": "❌", "skipped": "⏭️"}.get(r, "⚪")

          # ── derive ordered axes from actual data ──────────────────────────
          unit_records  = [r for r in records if r["suite"] == "unit"]
          intg_records  = [r for r in records if r["suite"] == "integration"]

          # Sorted so the table is deterministic regardless of run order
          unit_oses = sorted({r["os"]  for r in unit_records})
          unit_pys  = sorted({r["py"]  for r in unit_records})
          intg_pys  = sorted({r["py"]  for r in intg_records})

          # Build lookup: (suite, os, py) → result
          lookup = {(r["suite"], r["os"], r["py"]): r["result"] for r in records}

          # ── overall result ────────────────────────────────────────────────
          all_results = [r["result"] for r in records]
          if not all_results:
              overall = "skipped"
          elif any(r == "failure" for r in all_results):
              overall = "failure"
          elif all(r == "skipped" for r in all_results):
              overall = "skipped"
          else:
              overall = "success"

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"result={overall}\n")

          badge = {"success": "✅ All tests passed",
                   "failure": "❌ Tests failed",
                   "skipped": "⏭️ Tests skipped"}.get(overall, "⚪ Unknown")

          # ── write GITHUB_STEP_SUMMARY ─────────────────────────────────────
          lines = []
          a = lines.append

          a(f"## {badge}")
          a("")
          a("**Trigger:** `${{ github.event_name }}` · "
            "**Ref:** `${{ github.ref_name }}` · "
            "**SHA:** `${{ github.sha }}`")
          a("")

          # Unit matrix — columns = python versions, rows = OS
          a("### 🧪 Unit Tests")
          a("")
          if unit_records:
              header = "| OS | " + " | ".join(f"py{p}" for p in unit_pys) + " |"
              sep    = "|---|" + "---|" * len(unit_pys)
              a(header); a(sep)
              for os_name in unit_oses:
                  cells = " | ".join(
                      icon(lookup.get(("unit", os_name, py), "⚪"))
                      for py in unit_pys
                  )
                  a(f"| `{os_name}` | {cells} |")
          else:
              a("_No results (skipped)_")
          a("")

          # Integration matrix — rows = OS, columns = python versions (both from data)
          a("### 🔗 Integration Tests")
          a("")
          if intg_records:
              intg_oses = sorted({r["os"] for r in intg_records})
              header = "| OS | " + " | ".join(f"py{p}" for p in intg_pys) + " |"
              sep    = "|---|" + "---|" * len(intg_pys)
              a(header); a(sep)
              for intg_os in intg_oses:
                  cells = " | ".join(
                      icon(lookup.get(("integration", intg_os, py), "⚪"))
                      for py in intg_pys
                  )
                  a(f"| `{intg_os}` | {cells} |")
          else:
              a("_No results (skipped)_")
          a("")

          # Overall
          intg_oses = sorted({r["os"] for r in intg_records}) if intg_records else []
          unit_ok = all(lookup.get(("unit", o, p), "⚪") == "success"
                        for o in unit_oses for p in unit_pys)
          intg_ok = all(lookup.get(("integration", o, p), "⚪") == "success"
                        for o in intg_oses for p in intg_pys)
          unit_str = f"{len(unit_oses)}×OS × {len(unit_pys)}×Py  ({len(unit_records)} legs)"
          intg_str = f"{len(intg_oses)}×OS × {len(intg_pys)}×Py  ({len(intg_records)} legs)"

          a("### 📊 Overall")
          a("")
          a("| Suite | Matrix | Result |")
          a("|---|---|---|")
          a(f"| Unit Tests | {unit_str} | {icon('success' if unit_ok else 'failure')} |")
          a(f"| Integration Tests | {intg_str} | {icon('success' if intg_ok else 'failure')} |")

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          pathlib.Path(summary_path).write_text("\n".join(lines) + "\n")
          print("\n".join(lines))

      - name: Fail if tests failed
        if: steps.outcome.outputs.result == 'failure'
        run: exit 1
